<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RPDevlet - Hesap Oluştur</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="register-box">

    <h1>RPDevlet</h1>

    <h2>Hesap Oluştur</h2>

    <form method="POST">

        <input
        type="text"
        name="username"
        placeholder="Kullanıcı Adı"
        required>

        <input
        type="password"
        name="password"
        placeholder="Şifre"
        required>

        <button type="submit">

            Hesap Oluştur

        </button>

    </form>

    <p>

        Zaten hesabın var mı?

        <a href="/login">

            Giriş Yap

        </a>

    </p>

</div>

</body>

</html>
